<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.SiteName}} · Sign in</title>
<link rel="icon" href="/favicon.ico">
<style>
:root{--bg:#0f172a;--card:#1e293b;--accent:#3b82f6;--text:#e2e8f0;--muted:#94a3b8}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--card);padding:40px;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.45);width:360px}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo{width:40px;height:40px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px}
h1{font-size:20px;margin:0}
label{display:block;font-size:13px;color:var(--muted);margin:16px 0 6px}
input{width:100%;padding:11px 12px;border-radius:8px;border:1px solid #334155;background:#0b1220;color:var(--text);font-size:14px}
button{margin-top:24px;width:100%;padding:12px;border:0;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;font-size:15px;cursor:pointer}
button:hover{background:#2563eb}
.foot{margin-top:18px;text-align:center;font-size:12px;color:var(--muted)}
a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><div class="logo">{{.Initial}}</div><h1>{{.SiteName}}</h1></div>
  <form method="post" action="/api/auth/login">
    <label for="u">Username or email</label>
    <input id="u" name="username" autocomplete="username" required>
    <label for="p">Password</label>
    <input id="p" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Sign in</button>
  </form>
  <div class="foot">Self-hosted file sync &amp; share · <a href="/about">About</a></div>
</div>
</body>
</html>
