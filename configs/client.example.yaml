# wanopt-client configuration
server: "your.server.example:4242"   # QUIC server host:port (":443" for h3 camo)
psk: "REPLACE_WITH_BASE64_PSK"        # from `wanopt-keygen`; must match server
pin: "REPLACE_WITH_SERVER_SPKI_PIN"   # printed by the server at startup
alpn: "h3"                            # must match the server

socks_listen: "127.0.0.1:1080"        # local SOCKS5 proxy (empty to disable)
http_listen: "127.0.0.1:8080"         # local HTTP proxy (empty to disable)

idle_timeout_sec: 60
enable_0rtt: true                     # use 0-RTT resumption (server must allow)
compression: true                     # request adaptive compression (server must enable)
metrics_listen: "127.0.0.1:9102"      # Prometheus /metrics (empty = disabled)

# Receive-window caps in MiB (0 = built-in defaults: 16/24).
max_stream_recv_window_mb: 0
max_conn_recv_window_mb: 0
